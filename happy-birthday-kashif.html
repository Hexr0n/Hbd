<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday Kashif 🎂</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --deep-navy:   #0d0f1a;
      --midnight:    #111327;
      --gold:        #c9a84c;
      --gold-light:  #e8c97a;
      --rose:        #e07d8a;
      --lavender:    #a78bfa;
      --cream:       #f5efe6;
      --glow:        rgba(201,168,76,0.18);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--deep-navy);
      font-family: 'Montserrat', sans-serif;
      overflow-x: hidden;
    }

    /* ─── STARS ─────────────────────────────────── */
    #stars-canvas {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
    }

    /* ─── FLOATING PARTICLES ─────────────────────── */
    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
    .particle {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 0.8; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
    }

    /* ─── MAIN SCENE ─────────────────────────────── */
    .scene {
      position: relative; z-index: 2;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 24px 80px;
    }

    /* ─── ENVELOPE / CARD ────────────────────────── */
    .card {
      position: relative;
      width: min(680px, 96vw);
      background: linear-gradient(145deg, #181b2e 0%, #1e1f36 60%, #15172a 100%);
      border: 1px solid rgba(201,168,76,0.35);
      border-radius: 24px;
      padding: 56px 52px 52px;
      text-align: center;
      box-shadow:
        0 0 60px rgba(201,168,76,0.12),
        0 0 120px rgba(167,139,250,0.07),
        inset 0 1px 0 rgba(255,255,255,0.06);
      animation: cardReveal 1.4s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes cardReveal {
      from { opacity: 0; transform: translateY(40px) scale(.97); }
      to   { opacity: 1; transform: none; }
    }

    /* corner ornament lines */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 60px; height: 60px;
      border-color: var(--gold);
      border-style: solid;
      opacity: .45;
    }
    .card::before { top: 18px; left: 18px; border-width: 2px 0 0 2px; border-radius: 6px 0 0 0; }
    .card::after  { bottom: 18px; right: 18px; border-width: 0 2px 2px 0; border-radius: 0 0 6px 0; }

    /* ─── INNER CORNER ORNAMENTS ─────────────────── */
    .corner-tr, .corner-bl {
      position: absolute;
      width: 60px; height: 60px;
      border-color: var(--gold);
      border-style: solid;
      opacity: .45;
    }
    .corner-tr { top: 18px; right: 18px; border-width: 2px 2px 0 0; border-radius: 0 6px 0 0; }
    .corner-bl { bottom: 18px; left: 18px; border-width: 0 0 2px 2px; border-radius: 0 0 0 6px; }

    /* ─── EMOJI RING ──────────────────────────────── */
    .emoji-ring {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-bottom: 28px;
      font-size: 1.4rem;
      animation: fadeSlideDown .8s .6s both;
    }
    .emoji-ring span { animation: sway 3s ease-in-out infinite; display: inline-block; }
    .emoji-ring span:nth-child(2) { animation-delay: .3s; }
    .emoji-ring span:nth-child(3) { animation-delay: .6s; }
    .emoji-ring span:nth-child(4) { animation-delay: .9s; }
    .emoji-ring span:nth-child(5) { animation-delay: 1.2s; }

    @keyframes sway {
      0%,100% { transform: rotate(-8deg) scale(1); }
      50%      { transform: rotate(8deg) scale(1.12); }
    }

    /* ─── EYEBROW ────────────────────────────────── */
    .eyebrow {
      font-family: 'Montserrat', sans-serif;
      font-size: .72rem; letter-spacing: .28em; text-transform: uppercase;
      color: var(--gold); opacity: .8;
      margin-bottom: 14px;
      animation: fadeSlideDown .8s .7s both;
    }

    /* ─── HEADLINE ───────────────────────────────── */
    .headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 7vw, 4rem);
      font-weight: 700;
      line-height: 1.12;
      background: linear-gradient(135deg, var(--gold-light) 10%, var(--gold) 55%, var(--rose) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeSlideDown .9s .85s both;
      margin-bottom: 6px;
    }

    /* ─── NAME ───────────────────────────────────── */
    .name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 10vw, 5.6rem);
      font-weight: 400; font-style: italic;
      color: var(--cream);
      letter-spacing: .02em;
      line-height: 1;
      text-shadow: 0 0 40px rgba(201,168,76,0.5), 0 0 80px rgba(201,168,76,0.2);
      animation: namePop 1s 1s cubic-bezier(.22,1,.36,1) both;
      margin-bottom: 28px;
    }

    @keyframes namePop {
      from { opacity: 0; transform: scale(.88); filter: blur(8px); }
      to   { opacity: 1; transform: none; filter: none; }
    }

    /* ─── DIVIDER ─────────────────────────────────── */
    .divider {
      display: flex; align-items: center; gap: 14px;
      margin: 0 auto 28px;
      width: 70%;
      animation: fadeIn 1s 1.2s both;
    }
    .divider-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); opacity: .5; }
    .divider-gem  { font-size: .9rem; }

    /* ─── VERSE ───────────────────────────────────── */
    .verse {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.05rem, 3vw, 1.3rem);
      font-style: italic;
      color: rgba(245,239,230,.75);
      line-height: 1.85;
      max-width: 480px; margin: 0 auto 36px;
      animation: fadeIn 1s 1.35s both;
    }

    /* ─── CAKE GLOW ───────────────────────────────── */
    .cake-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 36px;
      animation: fadeIn 1s 1.5s both;
    }
    .cake-emoji { font-size: 4.5rem; display: block; filter: drop-shadow(0 0 18px rgba(201,168,76,.6)); animation: pulse 2s ease-in-out infinite; }
    .cake-glow  {
      position: absolute; inset: -20px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,.3) 0%, transparent 70%);
      animation: glowBreath 2.5s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes pulse       { 0%,100%{transform:scale(1);}  50%{transform:scale(1.08);} }
    @keyframes glowBreath  { 0%,100%{opacity:.5;} 50%{opacity:1;} }

    /* ─── CANDLES ─────────────────────────────────── */
    .candles { display: flex; gap: 22px; justify-content: center; margin-bottom: 40px; animation: fadeIn 1s 1.65s both; }
    .candle { text-align: center; }
    .candle-flame { font-size: 1.5rem; animation: flicker .8s ease-in-out infinite alternate; display: block; }
    .candle-body  {
      width: 14px; height: 44px; margin: 0 auto;
      border-radius: 4px 4px 2px 2px;
      background: linear-gradient(180deg, #ffe8a3 0%, #f5c842 100%);
      box-shadow: 0 0 8px rgba(245,200,66,.4);
    }

    .candle:nth-child(1) .candle-flame { animation-delay: 0s; }
    .candle:nth-child(2) .candle-flame { animation-delay: .15s; }
    .candle:nth-child(3) .candle-flame { animation-delay: .3s; }
    .candle:nth-child(4) .candle-flame { animation-delay: .45s; }

    @keyframes flicker {
      from { transform: scaleY(1) rotate(-3deg); filter: brightness(1); }
      to   { transform: scaleY(1.12) rotate(3deg); filter: brightness(1.25); }
    }

    /* ─── WISH TAGS ───────────────────────────────── */
    .wish-tags { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 44px; animation: fadeIn 1s 1.8s both; }
    .tag {
      padding: 7px 18px;
      border: 1px solid rgba(201,168,76,.3);
      border-radius: 40px;
      font-size: .78rem; letter-spacing: .12em; text-transform: uppercase;
      color: var(--gold-light);
      background: rgba(201,168,76,.07);
      backdrop-filter: blur(4px);
      transition: background .25s, border-color .25s;
    }
    .tag:hover { background: rgba(201,168,76,.18); border-color: var(--gold); }

    /* ─── FOOTER RIBBON ───────────────────────────── */
    .ribbon {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,.4), transparent);
      margin-bottom: 20px;
      animation: fadeIn 1s 2s both;
    }

    .footer-msg {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(.95rem, 2.5vw, 1.05rem);
      color: rgba(245,239,230,.5);
      font-style: italic;
      animation: fadeIn 1s 2.1s both;
    }
    .footer-msg em { color: var(--gold-light); font-style: normal; }

    /* ─── MADE BY WATERMARK ───────────────────────── */
    .watermark {
      position: fixed;
      bottom: 18px; right: 22px;
      font-family: 'Montserrat', sans-serif;
      font-size: .68rem; letter-spacing: .15em; text-transform: uppercase;
      color: rgba(201,168,76,.55);
      z-index: 10;
      writing-mode: horizontal-tb;
      transition: color .3s;
      animation: fadeIn 1.5s 2.5s both;
    }
    .watermark:hover { color: var(--gold-light); }
    .watermark span { color: var(--gold); font-weight: 600; }

    /* ─── CONFETTI BURST ─────────────────────────── */
    .confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 3; overflow: hidden; }
    .confetti-piece {
      position: absolute;
      width: 8px; height: 14px;
      opacity: 0;
      animation: confettiFall linear forwards;
      border-radius: 2px;
    }

    @keyframes confettiFall {
      0%   { opacity: 1; transform: translateY(-20px) rotate(0deg); }
      100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
    }

    /* ─── SHARED ANIMS ───────────────────────────── */
    @keyframes fadeSlideDown { from{opacity:0;transform:translateY(-14px);} to{opacity:1;transform:none;} }
    @keyframes fadeIn        { from{opacity:0;} to{opacity:1;} }

    /* ─── RESPONSIVE ─────────────────────────────── */
    @media(max-width:480px) {
      .card { padding: 40px 28px 40px; }
      .candles { gap: 14px; }
      .candle-body { width: 11px; height: 34px; }
    }
  </style>
</head>
<body>

<!-- Star field -->
<canvas id="stars-canvas"></canvas>

<!-- Ambient floating particles -->
<div class="particles" id="particles"></div>

<!-- Confetti -->
<div class="confetti-container" id="confetti"></div>

<!-- Watermark -->
<div class="watermark">Made by <span>Warshan</span></div>

<!-- Main scene -->
<div class="scene">
  <div class="card">
    <div class="corner-tr"></div>
    <div class="corner-bl"></div>

    <!-- Emoji ring -->
    <div class="emoji-ring">
      <span>🌟</span><span>✨</span><span>🎉</span><span>✨</span><span>🌟</span>
    </div>

    <p class="eyebrow">A very special day</p>

    <h1 class="headline">Happy Birthday</h1>
    <p class="name">Kashif</p>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-gem">💎</div>
      <div class="divider-line"></div>
    </div>

    <!-- Verse -->
    <p class="verse">
      May this day be woven with golden moments,<br/>
      laughter that echoes, and dreams<br/>
      that finally find their wings.
    </p>

    <!-- Cake -->
    <div class="cake-wrap">
      <div class="cake-glow"></div>
      <span class="cake-emoji">🎂</span>
    </div>

    <!-- Candles row -->
    <div class="candles">
      <div class="candle"><span class="candle-flame">🔥</span><div class="candle-body"></div></div>
      <div class="candle"><span class="candle-flame">🔥</span><div class="candle-body" style="background:linear-gradient(180deg,#ffc8e0,#e07d8a)"></div></div>
      <div class="candle"><span class="candle-flame">🔥</span><div class="candle-body" style="background:linear-gradient(180deg,#d4bbff,#a78bfa)"></div></div>
      <div class="candle"><span class="candle-flame">🔥</span><div class="candle-body"></div></div>
    </div>

    <!-- Wish tags -->
    <div class="wish-tags">
      <span class="tag">Joy</span>
      <span class="tag">Love</span>
      <span class="tag">Health</span>
      <span class="tag">Success</span>
      <span class="tag">Adventure</span>
      <span class="tag">Peace</span>
    </div>

    <div class="ribbon"></div>
    <p class="footer-msg">Wishing you a year as <em>brilliant</em> as you are 🌙</p>
  </div>
</div>

<script>
  /* ── STAR CANVAS ─────────────────────────────────── */
  (function() {
    const canvas = document.getElementById('stars-canvas');
    const ctx    = canvas.getContext('2d');
    let W, H, stars = [];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function initStars(n = 200) {
      stars = Array.from({length: n}, () => ({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.4 + .3,
        a: Math.random(),
        speed: Math.random() * .004 + .001,
        phase: Math.random() * Math.PI * 2
      }));
    }

    function drawStars(t) {
      ctx.clearRect(0, 0, W, H);
      stars.forEach(s => {
        const alpha = (Math.sin(t * s.speed * 60 + s.phase) * .4 + .6) * s.a;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.fill();
      });
    }

    let then = 0;
    function loop(t) {
      requestAnimationFrame(loop);
      drawStars(t * .001);
    }

    resize();
    initStars();
    window.addEventListener('resize', () => { resize(); initStars(); });
    requestAnimationFrame(loop);
  })();

  /* ── FLOATING PARTICLES ──────────────────────────── */
  (function() {
    const container = document.getElementById('particles');
    const colors    = ['#c9a84c','#e8c97a','#e07d8a','#a78bfa','#f5efe6'];
    const count     = 22;

    for (let i = 0; i < count; i++) {
      const p   = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 5 + 3;
      Object.assign(p.style, {
        width:  size + 'px',
        height: size + 'px',
        left:   Math.random() * 100 + 'vw',
        background: colors[Math.floor(Math.random() * colors.length)],
        animationDuration: (Math.random() * 12 + 8) + 's',
        animationDelay:    (Math.random() * 10) + 's',
        opacity: Math.random() * .5 + .3
      });
      container.appendChild(p);
    }
  })();

  /* ── CONFETTI BURST ───────────────────────────────── */
  (function() {
    const container = document.getElementById('confetti');
    const colors = ['#c9a84c','#e8c97a','#e07d8a','#a78bfa','#7dd3fc','#86efac','#fcd34d'];

    function burst(n = 80) {
      for (let i = 0; i < n; i++) {
        const p = document.createElement('div');
        p.className = 'confetti-piece';
        Object.assign(p.style, {
          left:     Math.random() * 100 + 'vw',
          top:      '-20px',
          background: colors[Math.floor(Math.random() * colors.length)],
          transform: `rotate(${Math.random()*360}deg)`,
          animationDuration: (Math.random() * 3 + 2) + 's',
          animationDelay:    (Math.random() * 2) + 's',
          width:  (Math.random() * 8 + 5) + 'px',
          height: (Math.random() * 12 + 8) + 'px',
        });
        container.appendChild(p);
        p.addEventListener('animationend', () => p.remove());
      }
    }

    // initial burst
    setTimeout(() => burst(100), 400);
    // repeat every 8 s
    setInterval(() => burst(50), 8000);
  })();
</script>
</body>
</html>
